services:
  postgres:
    image: postgres:16
    container_name: my_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: jobflow-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mydatabase
      REDIS_URL: redis://my_redis:6379
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./worker
    container_name: jobflow-worker
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mydatabase
      REDIS_URL: redis://my_redis:6379
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: jobflow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

